name: Deploy para AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o codigo do GitHub
      uses: actions/checkout@v3

    - name: Configurar as credenciais da Amazon (AWS)
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Compactar o codigo em ZIP
      run: zip -r function.zip lambda_function.py

    - name: Atualizar o codigo la na AWS Lambda
      run: aws lambda update-function-code --function-name ProcessadorDeMensagens --zip-file fileb://function.zip